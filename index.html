*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:auto;scroll-behavior:smooth;}body{min-height:100%;}
body{background:#142840;font-family:'Season Sans',Inter,sans-serif;color:#F4F4E6;margin:0;}
h1,h2,h3,h4{font-family:'Season Mix',Georgia,serif;font-weight:500;}

.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
.orb-purple{width:500px;height:500px;top:-150px;left:-100px;background:radial-gradient(circle,rgba(111,112,246,0.15) 0%,transparent 70%);}
.orb-cyan{width:400px;height:400px;bottom:-100px;right:-80px;background:radial-gradient(circle,rgba(92,206,255,0.10) 0%,transparent 70%);}
.orb-coral{width:350px;height:350px;top:40%;left:50%;background:radial-gradient(circle,rgba(240,96,80,0.07) 0%,transparent 70%);}
.sidebar,.content-area,nav{position:relative;z-index:1;}

.app-layout{display:flex;min-height:100vh;align-items:flex-start;}

.sidebar{width:272px;min-width:272px;background:rgba(8,14,28,0.60);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;}
.sidebar-header{padding:20px 20px 12px;}
.sidebar-logo{height:24px;margin-bottom:14px;display:block;opacity:.95;}
.sidebar-tag{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#6F70F6;margin-bottom:6px;}
.sidebar-title{font-size:14px;color:#F4F4E6;font-weight:500;line-height:1.4;}
.progress-wrap{padding:0 20px 16px;}
.progress-track{background:#1e2130;border-radius:99px;height:4px;margin-bottom:6px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#6F70F6,#5CCEFF);border-radius:99px;width:0%;transition:width .5s ease;}
.progress-pct{font-size:11px;color:#666;}

.nav-item{display:flex;align-items:center;gap:12px;padding:6px 12px;margin:1px 8px;border-radius:12px;border:none;background:transparent;cursor:default;transition:background .15s;outline:none;text-align:left;width:calc(100% - 16px);}
.nav-item:focus-visible{box-shadow:0 0 0 2px rgba(111,112,246,.4);}
.nav-item.active{background:rgba(111,112,246,.13);cursor:pointer;}
.nav-item.done{cursor:pointer;}
.nav-item.done:hover{background:rgba(255,255,255,.04);}
.nav-item.active:hover{background:rgba(111,112,246,.16);}
.nav-icon{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:12px;font-weight:700;color:#4a4d62;font-family:'Season Mix',serif;background:#1a1d2e;border:1.5px solid #252840;transition:background .2s,border-color .2s,color .2s;line-height:1;font-variant-numeric:tabular-nums;}
.nav-icon svg{display:block;margin:0;flex:none;pointer-events:none;}
.nav-item.active .nav-icon{background:#6F70F6;border-color:#6F70F6;color:#fff;}
.nav-item.done .nav-icon{background:rgba(87,255,167,.12);border-color:rgba(87,255,167,.3);color:transparent;font-size:0;}
.nav-item-text{flex:1;min-width:0;}
.nav-item-title{font-size:13px;font-weight:600;color:#c8cad8;line-height:1.3;font-family:'Season Sans',sans-serif;}
.nav-item.active .nav-item-title{color:#F4F4E6;}
.nav-item.done .nav-item-title{color:#9ea1b8;}
.nav-item-sub{font-size:11px;color:#4a4d62;margin-top:2px;line-height:1.3;}
.nav-item.active .nav-item-sub{color:#8080a8;}
.sidebar-footer{margin-top:auto;padding:14px 20px;border-top:1px solid #1e2130;}
.reset-link{font-size:11px;color:#444;background:none;border:none;cursor:pointer;font-family:'Season Sans',sans-serif;transition:color .15s;}
.reset-link:hover{color:#666;}

.content-area{flex:1;min-height:100vh;padding:40px 40px 64px;display:grid;grid-template-columns:minmax(0,760px);justify-content:center;align-content:start;}

.welcome-tag{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#6F70F6;margin-bottom:14px;}
.welcome-headline{font-size:42px;font-weight:400;line-height:1.15;margin-bottom:8px;color:#F4F4E6;}
.welcome-headline span{color:#6F70F6;}
.welcome-quote{padding:20px 24px;background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-top:2px solid rgba(111,112,246,0.4);border-radius:12px;font-size:14px;line-height:1.7;color:#c8cad8;margin:24px 0;}
.welcome-quote cite{display:block;margin-top:8px;font-style:normal;font-size:12px;color:#555;}
.outcomes-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#5CCEFF;margin-bottom:14px;}
.outcome-card{display:flex;align-items:flex-start;gap:16px;background:#1e2130;border-radius:12px;padding:16px 20px;margin-bottom:10px;border:1px solid #222;transition:border-color .2s;}
.outcome-card:hover{border-color:#333;}
.outcome-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.outcome-icon img{width:22px;height:22px;object-fit:contain;}
.outcome-card-text h4{font-size:14px;color:#F4F4E6;font-weight:400;margin-bottom:4px;font-family:'Season Sans',sans-serif;}
.outcome-card-text p{font-size:13px;color:#999;line-height:1.5;}
.course-map{display:flex;gap:8px;flex-wrap:nowrap;margin:22px 0;overflow-x:auto;padding-bottom:4px;}
.map-pill{background:rgba(10,18,32,0.55);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:8px 14px;font-size:12px;color:#999;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.map-pill strong{color:#F4F4E6;}

.module-headline{font-size:40px;font-weight:400;line-height:1.15;color:#e8e9f8;margin-bottom:0;}
.storytell{font-size:14px;color:#dde2f0;line-height:1.75;margin-bottom:6px;font-weight:400;}
.module-body{background:rgba(10,18,40,0.55);border-top:2px solid #6F70F6;border-right:1px solid rgba(111,112,246,0.55);border-bottom:1px solid rgba(111,112,246,0.55);border-left:1px solid rgba(111,112,246,0.55);border-radius:14px;padding:20px 24px;margin-top:24px;margin-bottom:24px;}
.module-overview-label{font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#6F70F6;display:block;margin-bottom:14px;}
.module-overview-hook{color:#dde2f0;font-size:15px;line-height:1.7;margin:0 0 16px;font-weight:400;}
.module-results{display:flex;flex-direction:column;gap:8px;margin:0;}
.module-result{display:flex;align-items:flex-start;gap:10px;}
.module-result-arrow{color:#6F70F6;flex-shrink:0;margin-top:2px;font-size:14px;}
.module-result-text{color:#9aa4bc;font-size:13px;line-height:1.5;}

.sec-head{display:flex;flex-direction:column;align-items:flex-start;gap:10px;margin:36px 0 18px;}
.sec-head-row{display:flex;align-items:center;gap:12px;width:100%;}
.sec-dot{width:6px;height:36px;background:#6F70F6;border-radius:3px;flex-shrink:0;align-self:center;}
.sec-head h2{font-size:28px;color:#e8e9f8;font-weight:400;margin:0;font-family:'Season Mix',serif;}
.sec-hint{display:block;background:rgba(111,112,246,0.08);border-radius:8px;padding:10px 16px;font-size:13px;color:#9aa4bc;font-weight:400;font-family:'Season Sans',sans-serif;line-height:1.6;}
.sec-hint-sky{background:rgba(92,206,255,0.07);color:#7a9aae;}

.card{background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px 22px;margin-bottom:18px;font-size:14px;color:#c8cad8;line-height:1.7;}
.card p{margin:0 0 10px;}.card p:last-child{margin:0;}
.callout{background:rgba(111,112,246,0.07);border:1px solid rgba(111,112,246,0.25);border-left:3px solid #6F70F6;border-radius:0 12px 12px 0;padding:14px 18px;font-size:14px;color:#dde2f0;line-height:1.7;margin-bottom:18px;}
.callout strong{color:#9b9df8;}

.interactive-hint{display:flex;align-items:center;gap:6px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;color:#5a7080;font-style:italic;}
.interactive-hint-emoji{font-size:14px;font-style:normal;}

/* Flip cards */
.flip-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.flip-row-2{grid-template-columns:repeat(2,1fr);}
.flip-row-4{grid-template-columns:repeat(4,1fr);}
.flip-card{height:170px;perspective:800px;cursor:pointer;}
.flip-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s ease;}
.flip-card.flipped .flip-inner{transform:rotateY(180deg);}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;padding:16px 14px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.flip-front{background:rgba(10,18,32,0.55);border:1px solid rgba(255,255,255,0.07);}
.flip-front:hover{border-color:#6F70F6;}
.flip-back{background:linear-gradient(135deg,#4931FF,#6F70F6);transform:rotateY(180deg);overflow-y:auto;}
.flip-front h4{font-size:14px;color:#F4F4E6;margin-bottom:4px;}
.flip-front .fsub{font-size:11px;color:#8a93ad;margin-bottom:6px;}
.flip-front p.fhint{font-size:11px;color:#555;margin-top:6px;}
.flip-back h4{font-size:12px;color:#F4F4E6;margin-bottom:6px;font-family:'Season Mix',serif;}
.flip-back p{font-size:11.5px;color:rgba(244,244,230,.9);line-height:1.45;margin:0 0 5px;}
.flip-back p:last-child{margin:0;}

/* RAR flow */
.rar-flow{display:flex;flex-direction:column;gap:0;margin-bottom:18px;position:relative;padding-left:56px;}
.rar-flow::before{content:'';position:absolute;left:18px;top:36px;width:2px;height:calc(100% - 38px);background:linear-gradient(to bottom,rgba(111,112,246,0.4),rgba(87,255,167,0.4));}
.rar-step{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;position:relative;}
.rar-step:last-child{margin-bottom:0;}
.rar-circle{position:absolute;left:-56px;width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-family:'Season Mix',serif;font-weight:700;font-size:15px;flex-shrink:0;line-height:1;color:#fff;}
.rar-body{background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px 16px;width:100%;}
.rar-body h4{font-size:14px;color:#F4F4E6;margin-bottom:4px;font-weight:500;}
.rar-body p{font-size:13px;color:#7a8a9a;line-height:1.5;margin:0;}

/* Tabs */
.tabs{margin-bottom:18px;}
.tab-list{display:flex;gap:4px;border-bottom:2px solid rgba(255,255,255,0.08);flex-wrap:wrap;}
.tab-btn{padding:9px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-family:'Season Sans',sans-serif;font-weight:600;color:#7a8a9a;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab-btn.active{color:#6F70F6;border-bottom-color:#6F70F6;}
.tab-btn:hover:not(.active){color:#e8e9f8;}
.tab-panels{background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-top:none;border-radius:0 0 12px 12px;padding:18px 20px;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.tab-content h4{font-size:15px;color:#F4F4E6;margin-bottom:4px;font-family:'Season Mix',serif;font-weight:500;}
.tab-content .tlead{font-size:12px;color:#8a93ad;margin-bottom:12px;}
.sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
.sw-box{border-radius:10px;padding:11px 14px;font-size:12.5px;line-height:1.5;}
.sw-str{background:rgba(87,255,167,.07);border:1px solid rgba(87,255,167,.22);color:#bfeed5;}
.sw-wk{background:rgba(240,96,80,.06);border:1px solid rgba(240,96,80,.22);color:#f0c0b8;}
.sw-box b{display:block;font-size:10px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.sw-str b{color:#57FFA7;}.sw-wk b{color:#f06050;}
.signrow{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.signcard{background:rgba(8,14,28,0.5);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px 16px;}
.signcard h5{font-size:14px;color:#F4F4E6;margin-bottom:5px;font-family:'Season Mix',serif;font-weight:500;}
.signcard h5 .dates{font-size:11px;color:#6a7a8a;font-family:'Season Sans',sans-serif;font-weight:400;margin-left:6px;}
.signcard p{font-size:12.5px;color:#9aa4bc;line-height:1.55;margin:0;}
.signcard p b{color:#c8cad8;font-weight:600;}

/* Timeline flow */
.timeline-flow{display:flex;flex-direction:column;margin-bottom:18px;}
.tl-item{display:flex;align-items:stretch;gap:0;}
.tl-dot{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:44px;}
.tl-dot span{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#4931FF,#6F70F6);color:#F4F4E6;display:flex;align-items:center;justify-content:center;font-family:'Season Mix',serif;font-weight:700;font-size:14px;flex-shrink:0;z-index:1;}
.tl-line{width:2px;background:linear-gradient(to bottom,#6F70F6,rgba(111,112,246,.2));margin:0 auto;flex:1;min-height:18px;}
.tl-content{background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:13px 18px;margin-bottom:12px;margin-left:12px;flex:1;}
.tl-content h4{font-size:14px;color:#F4F4E6;margin-bottom:4px;font-weight:500;}
.tl-content p{font-size:13px;color:#9aa4bc;line-height:1.55;margin:0;}
.tl-content .tl-ex{font-size:12px;color:#7a8a9a;font-style:italic;margin-top:6px;}
.tl-item:last-child .tl-line{display:none;}
.tl-item:last-child .tl-content{margin-bottom:0;}

/* Myth vs reality */
.myth-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.myth-card{border-radius:14px;overflow:hidden;cursor:pointer;border:2px solid #f06050;background:rgba(10,18,40,0.55);transition:border-color .25s;}
.myth-card.revealed{border-color:#34c17a;}
.myth-front{padding:14px 16px;}
.myth-back{display:none;padding:14px 16px;background:rgba(52,193,122,.06);border-top:1px solid rgba(52,193,122,.3);}
.myth-card.revealed .myth-back{display:block;}
.myth-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#f06050;display:block;margin-bottom:5px;}
.myth-label.reality{color:#34c17a;}
.myth-front p{font-size:13px;color:#F4F4E6;margin:0 0 6px;line-height:1.5;}
.myth-back p{font-size:12.5px;color:#bfeed5;margin:0;line-height:1.55;}
.myth-tap{font-size:11px;color:#777;}

/* Decision cards */
.decision-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:18px;}
.decision-card{background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden;}
.dc-situation{padding:14px 18px;background:rgba(92,206,255,.04);}
.dc-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#5CCEFF;display:block;margin-bottom:5px;}
.dc-situation p{font-size:13.5px;color:#dde2f0;line-height:1.55;margin:0;}
.dc-reveal-btn{width:100%;padding:11px 18px;background:none;border:none;border-top:1px solid rgba(255,255,255,0.07);text-align:left;font-size:13px;font-weight:600;color:#6F70F6;cursor:pointer;font-family:'Season Sans',sans-serif;transition:background .15s;}
.dc-reveal-btn:hover{background:rgba(111,112,246,.05);}
.dc-answer{padding:14px 18px;background:rgba(52,193,122,.06);border-top:1px solid rgba(52,193,122,.25);display:none;}
.dc-answer.visible{display:block;}
.dc-answer p{font-size:13px;color:#dde2f0;line-height:1.6;margin:0;}
.dc-why{margin-top:8px!important;font-size:12px!important;color:#9aa4bc!important;}
.dc-why b{color:#57FFA7;}

/* Pair / matches */
.pair-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.pair-card{background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px 16px;}
.pair-card h4{font-size:14px;color:#F4F4E6;margin-bottom:6px;font-weight:500;}
.pair-card p{font-size:12.5px;color:#9aa4bc;line-height:1.55;margin:0;}

/* Accordion */
.accordion{margin-bottom:18px;}
.accordion-item{border:1px solid rgba(255,255,255,0.07);border-radius:12px;margin-bottom:6px;overflow:hidden;}
.accordion-header{width:100%;background:rgba(10,18,40,0.55);border:none;cursor:pointer;padding:14px 18px;text-align:left;font-size:14px;font-weight:600;font-family:'Season Sans',sans-serif;display:flex;justify-content:space-between;align-items:center;color:#dde2f0;transition:background .15s;}
.accordion-header:hover{background:rgba(111,112,246,.05);}
.accordion-header.open{background:rgba(111,112,246,.08);color:#9b9df8;}
.acc-icon{transition:transform .25s;font-style:normal;color:#777;}
.accordion-header.open .acc-icon{transform:rotate(180deg);color:#6F70F6;}
.accordion-body{display:none;padding:12px 18px 16px;background:rgba(8,14,28,0.4);font-size:13px;color:#9aa4bc;line-height:1.65;}
.accordion-body.open{display:block;}
.accordion-body b{color:#c8cad8;}

/* Houses grid */
.house-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
.house-card{background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 15px;border-left:3px solid var(--hc,#6F70F6);}
.house-card h4{font-size:13px;color:#F4F4E6;margin-bottom:4px;font-weight:600;font-family:'Season Sans',sans-serif;}
.house-card h4 span{font-size:11px;color:#6a7a8a;font-weight:400;margin-left:4px;}
.house-card p{font-size:12px;color:#9aa4bc;line-height:1.5;margin:0;}

/* Do/Don't (hemispheres) */
.dd-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.dd-col{border-radius:12px;overflow:hidden;}
.dd-header{padding:9px 14px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.dd-col.lower .dd-header{background:rgba(111,112,246,.2);color:#9b9df8;}
.dd-col.upper .dd-header{background:rgba(92,206,255,.18);color:#5CCEFF;}
.dd-col ul{list-style:none;padding:10px 14px;background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-top:none;border-radius:0 0 12px 12px;}
.dd-col ul li{padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12.5px;color:#9aa4bc;line-height:1.45;}
.dd-col ul li:last-child{border-bottom:none;}

/* Scenario */
.scenario-block{background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-top:2px solid rgba(92,206,255,0.4);border-radius:14px;padding:20px;margin-bottom:16px;}
.scenario-tag{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#5CCEFF;margin-bottom:8px;display:block;}
.scenario-block>p{font-size:14px;color:#F4F4E6;line-height:1.6;margin-bottom:14px;}
.scenario-choices{display:flex;flex-direction:column;gap:6px;}
.scenario-choice{padding:11px 16px;border:1px solid rgba(255,255,255,0.07);border-radius:10px;background:rgba(8,14,28,0.5);text-align:left;cursor:pointer;font-size:13px;font-family:'Season Sans',sans-serif;color:#bbb;transition:all .15s;}
.scenario-choice:hover:not(:disabled){border-color:#5CCEFF;color:#F4F4E6;}
.scenario-choice.correct{background:rgba(87,255,167,.1)!important;border-color:#57FFA7!important;color:#57FFA7!important;}
.scenario-choice.wrong{background:rgba(240,96,80,.08)!important;border-color:rgba(240,96,80,.4)!important;color:#f06050!important;}
.scenario-choice:disabled{cursor:default;}
.inline-explain{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.07);font-size:12px;line-height:1.5;font-weight:400;text-align:left;}
.inline-explain-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;}
.correct-inline .inline-explain-label{color:#57FFA7;}
.wrong-inline .inline-explain-label{color:#f06050;}
.correct-inline{color:rgba(87,255,167,.85);}
.wrong-inline{color:rgba(240,96,80,.85);}
.hidden-exp{display:none;}

/* Quiz / KC */
.quiz-block{background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px 24px;margin-bottom:14px;}
.quiz-q{font-size:15px;color:#F4F4E6;margin-bottom:14px;line-height:1.5;font-family:'Season Mix',serif;font-weight:400;}
.quiz-opts{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:0;}
.quiz-opts label{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 14px;border:1px solid rgba(255,255,255,0.07);border-radius:10px;font-size:13px;color:#bbb;transition:all .15s;}
.quiz-opts label:hover{border-color:#6F70F6;color:#F4F4E6;}
.quiz-opts input[type="radio"]{margin-top:2px;flex-shrink:0;accent-color:#6F70F6;}
.quiz-opts label.opt-correct{background:rgba(87,255,167,.1)!important;border-color:#57FFA7!important;color:#57FFA7!important;}
.quiz-opts label.opt-user-wrong{background:rgba(240,96,80,.07)!important;border-color:rgba(240,96,80,.3)!important;color:#f06050!important;}
.quiz-explain{margin-top:12px;font-size:13px;padding:14px 16px 12px;border-radius:10px;display:none;line-height:1.6;background:rgba(10,18,40,0.6);border:1px solid rgba(111,112,246,0.35);color:#c8cad8;position:relative;}
.quiz-explain::before{content:"💡 ПОЯСНЕННЯ";display:block;font-size:11px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.7);margin-bottom:8px;}
.quiz-explain.show-correct{display:block;}
.quiz-explain.show-wrong{display:block;}
.quiz-score{display:none;background:rgba(10,18,40,0.55);border:1px solid #6F70F6;border-radius:14px;padding:24px;text-align:center;margin-top:16px;}
.quiz-score.visible{display:block;}
.quiz-score-num{font-size:52px;font-family:'Season Mix',serif;font-weight:400;color:#FFC60A;}

.kc-lock{display:none;background:rgba(255,198,10,.08);border:1px solid rgba(255,198,10,.3);border-radius:10px;padding:12px 16px;font-size:13px;color:#f0d98a;margin-top:20px;margin-bottom:18px}
.kc-start-screen{display:flex;flex-direction:column;align-items:center;text-align:center;padding:36px 32px;background:rgba(10,18,40,0.55);border-top:2px solid #6F70F6;border-right:1px solid rgba(111,112,246,0.55);border-bottom:1px solid rgba(111,112,246,0.55);border-left:1px solid rgba(111,112,246,0.55);border-radius:14px;margin-top:28px;}
.kc-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(111,112,246,.15);color:#9b9df8;font-size:12px;font-weight:600;padding:5px 14px;border-radius:99px;margin-bottom:16px;}
.kc-start-title{font-size:24px;color:#F4F4E6;font-weight:400;font-family:'Season Mix',serif;margin-bottom:24px;}
.kc-stats{display:flex;align-items:center;gap:0;margin-bottom:24px;}
.kc-stat{display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 36px;}
.kc-stat-icon{color:#6a7a8a;}
.kc-stat-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#4a5a6a;}
.kc-stat-val{font-size:28px;font-weight:500;color:#F4F4E6;font-family:'Season Mix',serif;}
.kc-stat-divider{width:1px;height:60px;background:rgba(255,255,255,0.08);}
.kc-start-btn{background:#6F70F6;color:#F4F4E6;border:none;border-radius:10px;padding:14px 48px;font-family:'Season Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;}
.kc-start-btn:hover{background:#5a5be0;}
.kc-progress-bar-wrap{margin-bottom:20px;}
.kc-qnum{font-size:12px;color:#6a7a8a;margin-bottom:8px;}
.kc-track{background:rgba(255,255,255,.08);border-radius:99px;height:4px;overflow:hidden;}
.kc-fill{height:100%;background:linear-gradient(90deg,#5CCEFF,#6F70F6);border-radius:99px;transition:width .3s ease;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.kc-score-anim{animation:fadeInUp .5s ease forwards;}

/* Summary */
.summary-section{margin-bottom:28px;}
.summary-section-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.summary-section-head h2{font-size:18px;font-weight:500;}
.summary-accent{width:4px;height:22px;border-radius:2px;flex-shrink:0;}
.takeaway-list{display:flex;flex-direction:column;gap:12px;margin-bottom:28px;}
.takeaway-card{background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:18px 20px 18px 16px;display:flex;align-items:flex-start;gap:16px;border-left:3px solid var(--tc,#6F70F6);}
.takeaway-body h4{font-size:14px;font-weight:600;color:#F4F4E6;margin-bottom:5px;font-family:'Season Sans',sans-serif;}
.takeaway-body p{font-size:13px;color:#9aa4bc;line-height:1.6;margin:0;}
.reflection-prompts{display:flex;flex-direction:column;gap:10px;}
.r-prompt{background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-left:2px solid rgba(255,198,10,.5);border-radius:12px;padding:14px 18px;font-size:14px;color:#c8cad8;font-style:italic;line-height:1.7;}
.action-checks{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.action-checks li{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:rgba(10,18,40,0.55);border:1px solid rgba(255,255,255,0.07);border-left:2px solid rgba(92,206,255,0.55);border-radius:12px;cursor:pointer;transition:all .15s;}
.action-checks li:hover{border-color:rgba(255,255,255,0.12);}
.ach-box{width:20px;height:20px;border:1.5px solid #444;border-radius:5px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.action-checks li.done .ach-box{background:#5CCEFF;border-color:#5CCEFF;}
.action-checks li.done .ach-box::after{content:"\2713";color:#142840;font-size:11px;}
.action-checks li div strong{font-size:14px;color:#F4F4E6;display:block;margin-bottom:3px;font-weight:400;}
.action-checks li.done div strong{color:#5CCEFF;}
.action-checks li div p{font-size:12px;color:#777;line-height:1.5;margin:0;}

.mod-conclusion{background:rgba(10,18,40,0.55);border-top:2px solid #FFC60A;border-right:1px solid rgba(255,198,10,0.55);border-bottom:1px solid rgba(255,198,10,0.55);border-left:1px solid rgba(255,198,10,0.55);border-radius:14px;padding:20px 24px;margin-top:40px;margin-bottom:10px;}
.mod-conclusion-label{font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#FFC60A;display:block;margin-bottom:14px;}
.mod-conclusion p{font-size:14px;color:#dde2f0;line-height:1.7;margin:0;font-weight:400;}
.mod-conclusion p+p{margin-top:10px;}
.complete-wrap{margin-top:24px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:14px;}
.complete-btn{display:inline-flex;align-items:center;gap:8px;background:#6F70F6;color:#F4F4E6;border:none;border-radius:10px;padding:12px 28px;font-family:'Season Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;}
.complete-btn:hover{background:#5a5be0;}

@media(max-width:900px){.content-area{padding:24px 20px 60px;}.sidebar{width:230px;min-width:230px;}}
@media(max-width:700px){
 .app-layout{flex-direction:column;}
 .sidebar{width:100%;height:auto;position:static;}
 .flip-row,.flip-row-4{grid-template-columns:1fr 1fr;}
 .myth-cards,.house-grid,.pair-grid,.sw-grid,.dd-grid{grid-template-columns:1fr;}
 .kc-stat{padding:0 22px;}
 .welcome-headline{font-size:34px;}
}
/* ===== Memory interactives ===== */
.practice-sub{font-size:13px;color:#c8cad8;margin:18px 0 8px;font-weight:600}
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-head{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#5CCEFF;margin-bottom:2px}
.match-item{padding:11px 14px;border:1px solid rgba(255,255,255,0.08);border-radius:10px;background:rgba(8,14,28,0.5);color:#c8cad8;font-family:'Season Sans',sans-serif;font-size:13px;text-align:left;cursor:pointer;transition:all .15s;line-height:1.4}
.match-item:hover:not(.matched){border-color:#6F70F6;color:#F4F4E6}
.match-item.sel{border-color:#6F70F6;background:rgba(111,112,246,.16);color:#F4F4E6}
.match-item.matched{border-color:rgba(87,255,167,.5);background:rgba(87,255,167,.1);color:#57FFA7;cursor:default}
.match-item.matched::after{content:" \2713";color:#57FFA7}
.match-item.bad{border-color:#f06050;background:rgba(240,96,80,.1);animation:mpShake .4s}
.match-msg{font-size:13px;min-height:18px}
.match-msg.ok{color:#57FFA7}
@keyframes mpShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.ms-wrap{margin-bottom:6px}
.ms-prompt{font-size:14px;color:#F4F4E6;margin-bottom:12px;font-family:'Season Mix',serif}
.ms-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.ms-chip{padding:9px 16px;border:1px solid rgba(255,255,255,0.1);border-radius:99px;background:rgba(8,14,28,0.5);color:#c8cad8;font-family:'Season Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.ms-chip:hover:not(.locked){border-color:#6F70F6;color:#F4F4E6}
.ms-chip.sel{border-color:#6F70F6;background:rgba(111,112,246,.16);color:#F4F4E6}
.ms-chip.good{border-color:#57FFA7;background:rgba(87,255,167,.14);color:#57FFA7}
.ms-chip.miss{border-color:#57FFA7;border-style:dashed;color:#57FFA7}
.ms-chip.wrong{border-color:#f06050;background:rgba(240,96,80,.12);color:#f06050;text-decoration:line-through}
.ms-chip.locked{cursor:default}
.ms-check{background:transparent;border:1px solid #5CCEFF;color:#5CCEFF;border-radius:8px;padding:8px 20px;font-size:13px;font-family:'Season Sans',sans-serif;cursor:pointer;transition:all .15s}
.ms-check:hover{background:rgba(92,206,255,.1)}
.ms-msg{font-size:13px;margin-top:10px;line-height:1.5}
.ms-msg.ok{color:#57FFA7}
.ms-msg.bad{color:#f0a890}
.sort-pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:20px}
.sort-item{padding:9px 15px;border:1px solid rgba(255,255,255,0.1);border-radius:99px;background:rgba(8,14,28,0.6);color:#dde2f0;font-family:'Season Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.sort-item:hover{border-color:#6F70F6}
.sort-item.sel{border-color:#6F70F6;background:rgba(111,112,246,.18);color:#fff}
.sort-item.good{border-color:#57FFA7;background:rgba(87,255,167,.14);color:#57FFA7}
.sort-item.wrong{border-color:#f06050;background:rgba(240,96,80,.12);color:#f06050}
.sort-buckets{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.sort-bucket{border:1px dashed rgba(255,255,255,0.14);border-radius:12px;padding:10px;min-height:96px;cursor:pointer;transition:border-color .15s}
.sort-bucket:hover{border-color:#6F70F6}
.sort-bucket-h{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#9b9df8;margin-bottom:8px;text-align:center}
.sort-bucket-body{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.orbit-prompt{font-size:14px;color:#dde2f0;margin-bottom:14px;line-height:1.5}
.orbit-prompt .orbit-q{color:#9aa4bc}
.orbit-prompt b{color:#F4F4E6}
.orbit-stage{position:relative;width:260px;height:260px;margin:0 auto 6px}
.orbit-sun{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#ffd86b,#e6a800);display:flex;align-items:center;justify-content:center;font-size:22px;color:#3a2a00;z-index:2;box-shadow:0 0 24px rgba(255,198,10,.4)}
.orbit-ring{position:absolute;inset:0;animation:orbspin 64s linear infinite;transform-origin:center}
.orbit-stage:hover .orbit-ring{animation-play-state:paused}
.orbit-planet{position:absolute;transform:translate(-50%,-50%);width:54px;height:54px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);background:rgba(10,18,40,0.88);cursor:pointer;padding:0;transition:border-color .15s,background .15s}
.orbit-planet:hover{border-color:#6F70F6;background:rgba(111,112,246,.2)}
.orbit-planet.good{border-color:#57FFA7;background:rgba(87,255,167,.2)}
.orbit-planet.bad{border-color:#f06050;background:rgba(240,96,80,.2)}
.orbit-planet-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;animation:orbspin 64s linear infinite reverse;transform-origin:center}
.orbit-stage:hover .orbit-planet-inner{animation-play-state:paused}
.orbit-glyph{font-size:17px;color:#c8cad8;line-height:1}
.orbit-planet:hover .orbit-glyph,.orbit-planet.good .orbit-glyph{color:#fff}
.orbit-label{font-size:9px;color:#8a93ad;margin-top:1px}
@keyframes orbspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@media(max-width:700px){.sort-buckets{grid-template-columns:1fr}}

/* ===== Round bar + bigger prompt + zodiac wheel ===== */
.rbar{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.rbar-step{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#5CCEFF;background:rgba(92,206,255,.12);padding:5px 13px;border-radius:99px;transition:all .3s}
.rbar-dots{display:flex;gap:6px}
.rdot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s}
.rdot.active{background:#5CCEFF;box-shadow:0 0 8px rgba(92,206,255,.6);transform:scale(1.15)}
.rdot.done{background:#57FFA7}
.orbit-prompt{font-size:15px}
.orbit-prompt b{display:inline-block;font-size:20px;color:#fff;border-bottom:2px solid #6F70F6;padding-bottom:2px;font-family:'Season Mix',serif;font-weight:500}
.orbit-prompt.pulse{animation:promptPulse .55s ease}
@keyframes promptPulse{0%{transform:translateY(-6px);opacity:0}55%{transform:translateY(0);opacity:1}100%{transform:translateY(0)}}
.zw-stage{position:relative;width:340px;max-width:100%;height:340px;margin:4px auto 6px}
.zw-core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:62px;height:62px;border-radius:50%;background:radial-gradient(circle at 50% 45%,rgba(111,112,246,.45),rgba(20,40,64,.15));display:flex;align-items:center;justify-content:center;font-size:24px;color:#cdd2ff;z-index:2;border:1px solid rgba(111,112,246,.4);box-shadow:0 0 26px rgba(111,112,246,.3)}
.zw-ring{position:absolute;inset:0;animation:orbspin 96s linear infinite;transform-origin:center}
.zw-stage:hover .zw-ring{animation-play-state:paused}
.zw-node{position:absolute;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;border:1px solid var(--zc,rgba(255,255,255,.18));background:rgba(10,18,40,0.9);cursor:pointer;padding:0;transition:all .15s}
.zw-node:hover{background:rgba(255,255,255,.05);box-shadow:0 0 14px var(--zc)}
.zw-node.good{border-color:#57FFA7;background:rgba(87,255,167,.2);box-shadow:0 0 14px rgba(87,255,167,.5)}
.zw-node.bad{border-color:#f06050;background:rgba(240,96,80,.2)}
.zw-inner{display:flex;align-items:center;justify-content:center;width:100%;height:100%;animation:orbspin 96s linear infinite reverse;transform-origin:center}
.zw-stage:hover .zw-inner{animation-play-state:paused}
.zw-glyph{font-size:16px;color:var(--zc,#c8cad8);line-height:1}
.zw-node.good .zw-glyph{color:#fff}
.zw-name{font-size:8.5px;color:#9aa4bc;margin-top:2px;white-space:nowrap;font-family:'Season Sans',sans-serif;line-height:1}
.zw-node.good .zw-name{color:#bfeed5}

.flip-card{height:188px}.flip-front.flip-front-v2{justify-content:flex-start;gap:6px;padding:16px 12px 12px}.flip-ic{display:flex;align-items:center;justify-content:center;height:30px}.flip-key{font-family:'Season Mix',serif;font-weight:700;font-size:23px;line-height:1;color:#6F70F6}.flip-key.k-sky{color:#5CCEFF}.flip-key.k-gold{color:#FFC60A}.flip-front-v2 h4{font-size:13px;color:#c8cad8}.flip-front-v2 .fsub{font-size:11px;color:#9aa4bc;margin-top:-2px}.flip-front-v2 .fhint{margin-top:auto;color:#5a6680;font-size:11px}.sign-chips{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}.sign-chips span{font-size:10px;color:#e8e9f8;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:99px;padding:2px 8px;line-height:1.3}.kw-what{color:#6F70F6;font-weight:700}.kw-how{color:#5CCEFF;font-weight:700}.kw-where{color:#FFC60A;font-weight:700}</style>
</head>

const MODS_HV = [12, 14, 16, 12, 12, 9, 5]; // хв: modules 1–7
var TOTAL_HV = MODS_HV.reduce(function(a,b){return a+b;},0);

function goTo(idx){current=idx;renderModule(idx);updateNav();window.scrollTo(0,0);}
function completeModule(idx){
  if(!completed.includes(idx)){completed.push(idx);saveP();}
  var next=idx+1;
  if(next<TOTAL){current=next;updateNav();renderModule(next);window.scrollTo(0,0);}
  else{updateNav();}
}
function updateNav(){
  for(var i=0;i<TOTAL;i++){
    var b=document.getElementById("nav-"+i);var ic=document.getElementById("navicon-"+i);
    if(!b)continue;
    b.classList.remove("active","done");
    if(i===current)b.classList.add("active");
    else if(completed.includes(i))b.classList.add("done");
    if(ic){ic.textContent="";ic.innerHTML="";
      if(completed.indexOf(i)!==-1){ic.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#57FFA7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block"><polyline points="4,13 9,18 20,7"></polyline></svg>';}
      else{ic.textContent=String(i);}
    }
  }
  var pct=Math.round((completed.length/TOTAL)*100);
  var pf=document.getElementById("progressFill");var pp=document.getElementById("progressPct");
  if(pf)pf.style.width=pct+"%";
  if(pp)pp.textContent="Прогрес · "+pct+"%";
}
function renderModule(idx){
  var ca=document.getElementById("contentArea");
  try{ca.innerHTML=MODULES[idx]();}
  catch(err){ca.innerHTML="<div style='padding:32px;color:#f06050;font-size:13px'><strong>Помилка:</strong> "+err.message+"</div>";return;}
  hydrateImgs();
  if(idx===0){var el=document.getElementById("total-hv");if(el)el.textContent="~"+TOTAL_HV;}
  if(idx===8)setTimeout(kcCheckSaved,0);
}
function hydrateImgs(){ document.querySelectorAll('[data-ic]').forEach(function(el){ var k=el.getAttribute('data-ic'); if(IC[k]) el.src=IC[k]; }); }

/* Tabs */
function switchTab(btn,id){
  var box=btn.closest(".tabs");
  box.querySelectorAll(".tab-content").forEach(function(t){t.classList.remove("active");});
  box.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active");});
  var el=document.getElementById(id);if(el)el.classList.add("active");
  btn.classList.add("active");
}
/* Decision reveal */
function revealDecision(btn){
  var ans=btn.nextElementSibling;var vis=ans.classList.contains("visible");
  ans.classList.toggle("visible");
  btn.textContent=vis?"Який правильний підхід? →":"Сховати ↑";
}
/* Accordion */
function toggleAccordion(btn){btn.classList.toggle("open");btn.nextElementSibling.classList.toggle("open");}

/* Scenario */
var SVG_CHECK='<svg viewBox="0 0 12 12" width="13" height="13" fill="none" stroke="#57FFA7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block"><polyline points="1.5,6.5 4.5,9.5 10.5,3"/></svg>';
var SVG_CROSS='<svg viewBox="0 0 12 12" width="13" height="13" fill="none" stroke="#f06050" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:block"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>';
function pickScenario(btn,id,type){
  var block=btn.closest(".scenario-block");
  if(btn.querySelector('.inline-explain'))return;
  if(type==="good"){
    btn.classList.add("correct");
    var ex=document.getElementById(id+"-explain-good");var txt=ex?ex.innerHTML:"";
    if(txt){var inner=document.createElement("div");inner.className="inline-explain correct-inline";inner.innerHTML='<div class="inline-explain-label">'+SVG_CHECK+' Правильно</div>'+txt;btn.appendChild(inner);}
  }else{
    btn.classList.add("wrong");btn.disabled=true;
    var key=btn.dataset.key||"";
    var wEx=document.getElementById(id+"-explain-"+key);var wTxt=wEx?wEx.innerHTML:"";
    var w=document.createElement("div");w.className="inline-explain wrong-inline";w.innerHTML='<div class="inline-explain-label">'+SVG_CROSS+' Не зовсім</div>'+(wTxt||"");btn.appendChild(w);
    var cb=block.querySelector(".scenario-choice[data-good='true']");
    if(cb&&!cb.querySelector('.inline-explain')){cb.classList.add("correct");var ex2=document.getElementById(id+"-explain-good");var t2=ex2?ex2.innerHTML:"";if(t2){var inner2=document.createElement("div");inner2.className="inline-explain correct-inline";inner2.innerHTML='<div class="inline-explain-label">'+SVG_CHECK+' Правильно</div>'+t2;cb.appendChild(inner2);}}
  }
}

var kcCurrent=0,kcAnswers={},kcActive=false,kcPassed=false;
function kcStart(){
  var s=document.getElementById("kcStart");s.style.display="none";
  document.getElementById("kcQuiz").style.display="block";
  kcCurrent=0;kcAnswers={};kcActive=true;kcRenderQ();
}
function kcCheckSaved(){
  try{
    var saved=localStorage.getItem(KC_KEY);
    if(!saved)return;
    var d=JSON.parse(saved);
    kcAnswers=d.answers;kcActive=false;
    document.getElementById("kcStart").style.display="none";
    document.getElementById("kcQuiz").style.display="none";
    document.getElementById("kcResults").style.display="block";
    var lock=document.getElementById("kcLock");
    if(lock){lock.style.display="block";lock.textContent="Ти вже пройшов цю перевірку знань: її можна скласти лише раз. Збережені результати нижче, а матеріали лишаються відкритими для перегляду.";}
    kcSubmit();
  }catch(e){}
}
function kcRenderQ(){
  var q=KC_QUESTIONS[kcCurrent];
  document.getElementById("kcQnum").textContent="Питання "+(kcCurrent+1)+" з "+KC_QUESTIONS.length;
  document.getElementById("kcFill").style.width=Math.round(((kcCurrent+1)/KC_QUESTIONS.length)*100)+"%";
  document.getElementById("kcSelectHint").style.display="inline";
  document.getElementById("kcNextBtn").style.display="none";
  document.getElementById("kcSubmitBtn").style.display="none";
  var html='<div class="quiz-block" style="margin-bottom:0"><p class="quiz-q">'+q.question+'</p><ul class="quiz-opts">';
  q.opts.forEach(function(opt){html+='<li><label><input type="radio" name="kc_q" value="'+opt[0]+'" onchange="kcPick(this)"> '+opt[1]+'</label></li>';});
  html+='</ul></div>';
  document.getElementById("kcQuestion").innerHTML=html;
  if(kcAnswers[kcCurrent]!==undefined){
    document.querySelectorAll('input[name="kc_q"]').forEach(function(r){if(r.value===kcAnswers[kcCurrent]){r.checked=true;kcPick(r);}});
  }
}
function kcPick(radio){
  kcAnswers[kcCurrent]=radio.value;
  document.getElementById("kcSelectHint").style.display="none";
  if(kcCurrent<KC_QUESTIONS.length-1){document.getElementById("kcNextBtn").style.display="inline-flex";}
  else{document.getElementById("kcSubmitBtn").style.display="inline-flex";}
}
function kcNext(){if(kcCurrent<KC_QUESTIONS.length-1){kcCurrent++;kcRenderQ();}}
function kcSubmit(){
  document.getElementById("kcQuiz").style.display="none";
  document.getElementById("kcResults").style.display="block";
  window.scrollTo(0,0);
  var correct=0;
  KC_QUESTIONS.forEach(function(q,i){if(kcAnswers[i]===q.correct)correct++;});
  var total=KC_QUESTIONS.length;
  kcPassed=correct>=8;
  var barW=Math.round((correct/total)*100);
  var barColor=kcPassed?'#57FFA7':'#f06050';
  var msg=kcPassed
    ?"Чудово! Ти впевнено пройшов курс — тепер застосовуй ці знання в реальних розборах."
    :"Курс пройдено. Перездавати не потрібно — поглянь на питання, де схибив, і врахуй це в майбутніх розборах. Саме в цьому й цінність.";
  var progressBar='<div style="max-width:320px;margin:0 auto;position:relative;padding-top:22px;margin-bottom:6px">'
    +'<div style="position:absolute;top:0;left:'+barW+'%;transform:translateX(-50%);font-size:12px;color:'+barColor+';font-weight:700">'+barW+'%</div>'
    +'<div style="background:rgba(255,255,255,.06);border-radius:99px;height:8px;position:relative">'
    +'<div style="width:'+barW+'%;height:100%;background:'+barColor+';border-radius:99px"></div>'
    +'<div style="position:absolute;top:-4px;left:80%;width:2px;height:16px;background:rgba(255,255,255,.2)"></div></div>'
    +'<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:#444"><span>0%</span><span style="color:#555">Ціль: 80%</span><span>100%</span></div></div>';
  var scoreEl=document.getElementById("quizScore");
  scoreEl.innerHTML='<div class="quiz-score-num kc-score-anim">'+correct+'/'+total+'</div>'+progressBar
    +'<p style="font-size:14px;color:#c8cad8;max-width:440px;margin:0 auto 4px">'+msg+'</p>';
  var html="";
  KC_QUESTIONS.forEach(function(q,i){
    var userVal=kcAnswers[i];var isC=userVal===q.correct;
    html+='<div class="quiz-block" style="margin-bottom:10px"><p class="quiz-q">'+q.question+'</p><ul class="quiz-opts">';
    q.opts.forEach(function(opt){
      var cls="";
      if(opt[0]===q.correct)cls=" opt-correct";
      else if(opt[0]===userVal&&!isC)cls=" opt-user-wrong";
      html+='<li><label class="'+cls+'"><input type="radio" disabled'+(opt[0]===userVal?" checked":"")+'> '+opt[1]+'</label></li>';
    });
    html+='</ul><div class="quiz-explain '+(isC?"show-correct":"show-wrong")+'">'+(isC?q.expC:q.expW)+'</div></div>';
  });
  document.getElementById("kcResultsList").innerHTML=html;
  sendQuizResult(correct,total,kcPassed);
  try{localStorage.setItem(KC_KEY,JSON.stringify({correct:correct,total:total,answers:kcAnswers}));}catch(e){}
}


// ===== Memory interactives =====
var MATCH={},MULTI={},SORT={},ORBIT={};
function _shuffle(a){for(var k=a.length-1;k>0;k--){var j=Math.floor(Math.random()*(k+1));var t=a[k];a[k]=a[j];a[j]=t;}return a;}
function _derange(a){var r=a.slice();var attempts=0;do{_shuffle(r);attempts++;}while(attempts<20&&r.some(function(x,i){return x.i===i;}));return r;}

function matchGameHTML(id,pairs,lh,rh){
  MATCH[id]={total:pairs.length,done:0,sel:null};
  var left=pairs.map(function(p,i){return {t:p[0],i:i};});
  var right=_derange(pairs.map(function(p,i){return {t:p[1],i:i};}));
  var h='<div class="match-wrap" id="'+id+'"><div class="match-col"><div class="match-head">'+lh+'</div>';
  left.forEach(function(o){h+='<button class="match-item" data-side="L" data-p="'+o.i+'" onclick="mgPick(\''+id+'\',this)">'+o.t+'</button>';});
  h+='</div><div class="match-col"><div class="match-head">'+rh+'</div>';
  right.forEach(function(o){h+='<button class="match-item" data-side="R" data-p="'+o.i+'" onclick="mgPick(\''+id+'\',this)">'+o.t+'</button>';});
  h+='</div></div><div class="match-msg" id="'+id+'-msg"></div>';
  return h;
}
function mgPick(id,btn){
  var st=MATCH[id]; if(btn.classList.contains('matched'))return;
  var wrap=document.getElementById(id);
  if(btn.getAttribute('data-side')==='L'){
    wrap.querySelectorAll('.match-item[data-side="L"]').forEach(function(b){b.classList.remove('sel');});
    btn.classList.add('sel'); st.sel=btn.getAttribute('data-p'); return;
  }
  if(st.sel==null) return;
  var leftBtn=wrap.querySelector('.match-item[data-side="L"].sel');
  if(btn.getAttribute('data-p')===st.sel){
    btn.classList.add('matched'); btn.disabled=true;
    if(leftBtn){leftBtn.classList.remove('sel');leftBtn.classList.add('matched');leftBtn.disabled=true;}
    st.sel=null; st.done++;
    if(st.done===st.total){var m=document.getElementById(id+'-msg');m.className='match-msg ok';m.textContent='Готово — усі пари правильні!';}
  } else {
    btn.classList.add('bad'); setTimeout(function(){btn.classList.remove('bad');},600);
  }
}

function multiSelectHTML(id,prompt,options){
  MULTI[id]=options.map(function(o){return o[1];});
  var h='<div class="ms-wrap" id="'+id+'"><p class="ms-prompt">'+prompt+'</p><div class="ms-chips">';
  options.forEach(function(o,i){h+='<button class="ms-chip" data-i="'+i+'" onclick="msToggle(this)">'+o[0]+'</button>';});
  h+='</div><button class="ms-check" onclick="msCheck(\''+id+'\')">Перевірити</button><div class="ms-msg" id="'+id+'-msg"></div></div>';
  return h;
}
function msToggle(btn){ if(btn.classList.contains('locked'))return; btn.classList.toggle('sel'); }
function msCheck(id){
  var corr=MULTI[id]; var wrap=document.getElementById(id); var ok=true;
  wrap.querySelectorAll('.ms-chip').forEach(function(c){
    var i=+c.getAttribute('data-i'); var sel=c.classList.contains('sel'); c.classList.add('locked');
    if(corr[i]&&sel)c.classList.add('good');
    else if(corr[i]&&!sel){c.classList.add('miss');ok=false;}
    else if(!corr[i]&&sel){c.classList.add('wrong');ok=false;}
  });
  var m=document.getElementById(id+'-msg'); m.className='ms-msg '+(ok?'ok':'bad');
  m.textContent=ok?'Точно! Усі правильні варіанти обрано.':'Майже: зелене — правильне, червоне — зайве, обведене пунктиром ти пропустив(ла).';
}

function sortGameHTML(id,buckets,items){
  SORT[id]={sel:null};
  var arr=_shuffle(items.map(function(it,i){return {t:it[0],b:it[1],i:i};}));
  var h='<div class="sort-wrap" id="'+id+'"><div class="sort-pool" id="'+id+'-pool">';
  arr.forEach(function(o){h+='<button class="sort-item" data-b="'+o.b+'" onclick="sortPick(\''+id+'\',this,event)">'+o.t+'</button>';});
  h+='</div><div class="sort-buckets">';
  buckets.forEach(function(b,bi){h+='<div class="sort-bucket" onclick="sortDrop(\''+id+'\','+bi+',this)"><div class="sort-bucket-h">'+b+'</div><div class="sort-bucket-body"></div></div>';});
  h+='</div><button class="ms-check" onclick="sortCheck(\''+id+'\')">Перевірити</button><div class="ms-msg" id="'+id+'-msg"></div></div>';
  return h;
}
function sortPick(id,btn,e){ if(e)e.stopPropagation(); var w=document.getElementById(id); if(btn.classList.contains('good'))return; if(btn.classList.contains('wrong')){ btn.classList.remove('wrong','sel'); btn.removeAttribute('data-placed'); document.getElementById(id+'-pool').appendChild(btn); SORT[id].sel=null; return;} w.querySelectorAll('.sort-item').forEach(function(b){b.classList.remove('sel');}); btn.classList.remove('good','wrong'); btn.classList.add('sel'); SORT[id].sel=btn; }
function sortDrop(id,bi,bucket){ var st=SORT[id]; if(!st.sel)return; bucket.querySelector('.sort-bucket-body').appendChild(st.sel); st.sel.classList.remove('sel'); st.sel.setAttribute('data-placed',bi); st.sel=null; }
function sortCheck(id){
  var w=document.getElementById(id); var ok=true; var allPlaced=true;
  w.querySelectorAll('.sort-item').forEach(function(it){
    it.classList.remove('good','wrong');
    if(it.getAttribute('data-placed')===null||it.getAttribute('data-placed')===undefined){allPlaced=false;return;}
    if(+it.getAttribute('data-placed')===+it.getAttribute('data-b'))it.classList.add('good'); else {it.classList.add('wrong');ok=false;}
  });
  var m=document.getElementById(id+'-msg');
  if(!allPlaced){m.className='ms-msg bad';m.textContent='Спершу розподіли всі знаки по колонках.';return;}
  m.className='ms-msg '+(ok?'ok':'bad'); m.textContent=ok?'Усе правильно розподілено!':'Червоні стоять не у своїй колонці — натисни їх і перенеси.';
}

function orbitHTML(id,planets,rounds){
  ORBIT[id]={rounds:rounds,idx:0};
  var n=planets.length, R=108, C=130;
  var h=roundBarHTML(id,rounds.length);
  h+='<div class="orbit-prompt pulse" id="'+id+'-prompt"><span class="orbit-q">Натисни планету, що відповідає за:</span> <b>'+rounds[0][0]+'</b></div>';
  h+='<div class="orbit-stage"><div class="orbit-sun">☉</div><div class="orbit-ring" id="'+id+'-ring">';
  planets.forEach(function(p,i){
    var ang=(i*360/n)*Math.PI/180; var x=Math.round(C+R*Math.cos(ang)); var y=Math.round(C+R*Math.sin(ang));
    h+='<button class="orbit-planet" style="left:'+x+'px;top:'+y+'px" onclick="orbPick(\''+id+'\',\''+p[0]+'\',this)"><span class="orbit-planet-inner"><span class="orbit-glyph">'+p[1]+'</span><span class="orbit-label">'+p[2]+'</span></span></button>';
  });
  h+='</div></div><div class="ms-msg" id="'+id+'-msg"></div>';
  return h;
}
function orbPick(id,key,btn){
  var st=ORBIT[id]; if(st.idx>=st.rounds.length)return;
  if(key===st.rounds[st.idx][1]){
    btn.classList.add('good'); btn.disabled=true; st.idx++;
    if(st.idx>=st.rounds.length){ finishWheel(id,'Чудово — кожна планета зв\'язана зі своєю функцією.'); }
    else { advRound(id,st.idx,st.rounds.length,'<span class="orbit-q">Натисни планету, що відповідає за:</span> <b>'+st.rounds[st.idx][0]+'</b>'); }
  } else { btn.classList.add('bad'); setTimeout(function(){btn.classList.remove('bad');},600); }
}

// shared round-bar helpers
function roundBarHTML(id,n){
  var d='';for(var i=0;i<n;i++){d+='<span class="rdot'+(i===0?' active':'')+'"></span>';}
  return '<div class="rbar"><span class="rbar-step" id="'+id+'-rc">Завдання 1 / '+n+'</span><span class="rbar-dots" id="'+id+'-dots">'+d+'</span></div>';
}
function advRound(id,idx,total,promptHTML){
  var rc=document.getElementById(id+'-rc'); if(rc)rc.textContent='Завдання '+(idx+1)+' / '+total;
  var dots=document.getElementById(id+'-dots'); if(dots){var sp=dots.children;for(var i=0;i<sp.length;i++){sp[i].className='rdot'+(i<idx?' done':(i===idx?' active':''));}}
  var pr=document.getElementById(id+'-prompt'); if(pr){pr.classList.remove('pulse');void pr.offsetWidth;pr.classList.add('pulse');pr.innerHTML=promptHTML;}
}
function finishWheel(id,msg){
  var pr=document.getElementById(id+'-prompt'); if(pr)pr.innerHTML='<span class="orbit-q">Усі вгадані!</span>';
  var dots=document.getElementById(id+'-dots'); if(dots){for(var i=0;i<dots.children.length;i++)dots.children[i].className='rdot done';}
  var rc=document.getElementById(id+'-rc'); if(rc){rc.textContent='Готово ✓';rc.style.background='rgba(87,255,167,.16)';rc.style.color='#57FFA7';}
  var m=document.getElementById(id+'-msg'); if(m){m.className='ms-msg ok';m.textContent=msg;}
}
